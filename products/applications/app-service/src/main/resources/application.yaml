server:
  port: 8080
spring:
  application:
    name: products
  devtools:
    add-properties: false
  flyway:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:store_db}
    user: ${DB_USER:admin}
    password: ${DB_PASSWORD:admin}
    schemas: ${DB_SCHEMA:public}
    baseline-on-migrate: true
  profiles:
    include: null
management:
  endpoints:
    web:
      exposure:
        include: "health,prometheus,info"
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always
      group:
        liveness:
          include: livenessState
        readiness:
          include: readinessState,db
cors:
  allowed-origins: "*"
adapters:
  r2dbc:
    host: ${DB_HOST:localhost}
    port: ${DB_PORT:5432}
    database: ${DB_NAME:store_db}
    schema: ${DB_SCHEMA:public}
    username: ${DB_USER:admin}
    password: ${DB_PASSWORD:admin}

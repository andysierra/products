server:
  port: 8080
spring:
  application:
    name: products
  devtools:
    add-properties: false
  profiles:
    include: null
management:
  endpoints:
    web:
      exposure:
        include: "health,prometheus"
  endpoint:
    health:
      probes:
        enabled: true
cors:
  allowed-origins: "*"
adapters:
  r2dbc:
    host: ${DB_HOST:localhost}
    port: ${DB_PORT:5432}
    database: ${DB_NAME:store_db}
    schema: ${DB_SCHEMA:public}
    username: ${DB_USER:admin}
    password: ${DB_PASSWORD:admin}
